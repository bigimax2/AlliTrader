<!DOCTYPE html>
<html lang="ru">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход через EVE SSO</title>
    <!-- Указываем CDN Bootstrap 5 (рекомендуется вместо локальной версии для новой верстки) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        /* Фон на весь экран */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('/static/authenticated/img/eve-online-desktop-backgrounds_112516553_224.jpg');  /* ← замените на путь к вашей фоновой картинке */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;  /* для эффекта параллакса при прокрутке */
        }

        /* Полупрозрачный фон для улучшения читаемости */
        .login-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.11);  /* затемнение фона */
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;  /* над оверлеем */
            background-color: rgba(73, 56, 56, 0.57);  /* почти прозрачный белый фон */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-card img {
            max-width: 280px;
            width: 100%;
            height: auto;
            margin-bottom: 30px;
            object-fit: contain;
        }

        .login-link {
            display: block;
            margin-top: 25px;
            color: #41bd0a;
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .login-link:hover {
            color: #6dca0a;
            text-decoration: underline;
        }

        /* Адаптация для мобильных */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                margin: 10px;
            }

            .login-card img {
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-overlay"></div>

        <div class="login-card">
            <div>
                <a href="{% url 'authenticated:get-token' %}">
                    <img src= '/static/authenticated/img/EVE_SSO_Login_Buttons_Large_Black.png'
                         alt="Зайти с помощью EVE SSO"
                         class="img-fluid">
                </a>
            </div>

            <a href="https://community.eveonline.com/support/third-party-applications/"
               class="login-link"
               target="_blank"
               rel="noopener noreferrer">
                Управление приложениями ESI
            </a>
        </div>
    </div>
</body>
</html>
