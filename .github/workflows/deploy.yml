name: Deploy to Production

on:
  push:
    branches: [ origin ]
  workflow_dispatch: {}  # Возможность запуска вручную

env:
  PROJECT_PATH: /var/www/allitrader
  VIRTUALENV_PATH: /var/www/allitrader/.venv
  DJANGO_SETTINGS: Main.settings

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    
    steps:
    - name: 🛎️ Notify - Deployment started
      uses: appleboy/discord-action@master
      if: always()
      with:
        webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        color: "#8b9b9c"
        username: "GitHub Bot"
        message: |
          Deploy started for ${{ github.sha }}

    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "=== Adding host to known_hosts ==="
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          
          echo "=== Starting deployment ==="
          cd $PROJECT_PATH
          
          echo "=== Pull latest changes ==="
          git pull origin master
          
          echo "=== Install Python dependencies ==="
          source $VIRTUALENV_PATH/bin/activate
          pip install -r requirements.txt --quiet
          
          echo "=== Run database migrations ==="
          python manage.py migrate --noinput
          
          echo "=== Collect static files ==="
          python manage.py collectstatic --noinput --clear
          
          echo "=== Restart services ==="
          supervisorctl restart allitrader:*
          
          echo "=== Deployment completed ==="
          supervisorctl status allitrader:*


    - name: 🛎️ Notify - Success
      if: success()
      uses: appleboy/discord-action@master
      with:
        webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        color: "#8b9b9c"
        username: "GitHub Bot"
        message: |
          ✅ Deploy succeeded: ${{ github.sha }}

    - name: 🛎️ Notify - Failed
      if: failure()
      uses: appleboy/discord-action@master
      with:
        webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        color: "#8b9b9c"
        username: "GitHub Bot"
        message: |
          ❌ Deploy failed: ${{ github.sha }}