name: Deploy to Production

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}  # Возможность запуска вручную

env:
  PROJECT_PATH: /var/www/allitrader
  VIRTUALENV_PATH: /var/www/allitrader/.venv
  DJANGO_SETTINGS: Main.settings

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    
    steps:
    - name: 🛎️ Notify - Deployment started
      uses: appleboy/discord-action@master
      if: always()
      with:
        webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        color: "#8b9b9c"
        username: "GitHub Bot"
        message: |
          Deploy started for ${{ github.sha }}

    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "=== Starting deployment ==="
          cd $PROJECT_PATH || mkdir -p $PROJECT_PATH
          
          echo "=== Check if git repo exists ==="
          if [ ! -d .git ]; then
            echo "Initializing git repository..."
            git init
            git remote add origin https://github.com/${{ github.repository }}.git
          fi
          
          echo "=== Pull latest changes ==="
          git fetch origin
          git checkout -f origin/master
          
          echo "=== Check Python and virtualenv ==="
          if [ -d "$VIRTUALENV_PATH" ]; then
            echo "Virtualenv exists at $VIRTUALENV_PATH"
            if [ -f "$VIRTUALENV_PATH/bin/activate" ]; then
              echo "=== Activate virtualenv ==="
              export VIRTUAL_ENV="$VIRTUALENV_PATH"
              export PATH="$VIRTUAL_ENV/bin:$PATH"
              export PYTHONHOME=""
              deactivate 2>/dev/null || true
              source "$VIRTUALENV_PATH/bin/activate"
              echo "Python path: $(which python)"
              echo "Python version: $(python --version 2>&1)"
            else
              echo "Virtualenv activate script not found!"
              exit 1
            fi
          else
            echo "Virtualenv not found at $VIRTUALENV_PATH"
            echo "Creating new virtualenv..."
            python3 -m venv $VIRTUALENV_PATH
            export VIRTUAL_ENV="$VIRTUALENV_PATH"
            export PATH="$VIRTUAL_ENV/bin:$PATH"
            source "$VIRTUALENV_PATH/bin/activate"
          fi
          
          echo "=== Install Python dependencies ==="
          pip install --upgrade pip
          pip install -r requirements.txt --quiet
          
          echo "=== Run database migrations ==="
          python manage.py migrate --noinput
          
          echo "=== Collect static files ==="
          python manage.py collectstatic --noinput --clear
          
          echo "=== Restart services ==="
          supervisorctl restart allitrader:*
          
          echo "=== Deployment completed ==="
          supervisorctl status allitrader:*


    - name: 🛎️ Notify - Success
      if: success()
      uses: appleboy/discord-action@master
      with:
        webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        color: "#8b9b9c"
        username: "GitHub Bot"
        message: |
          ✅ Deploy succeeded: ${{ github.sha }}

    - name: 🛎️ Notify - Failed
      if: failure()
      uses: appleboy/discord-action@master
      with:
        webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        color: "#8b9b9c"
        username: "GitHub Bot"
        message: |
          ❌ Deploy failed: ${{ github.sha }}